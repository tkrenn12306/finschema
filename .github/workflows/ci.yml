name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy

      - name: Test
        run: pytest

      - name: Coverage gate - types >=95%
        run: coverage report --include="finschema/types/*" --fail-under=95

  integrations:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies with integrations
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,pandas,polars,fastapi]

      - name: Integration tests
        run: pytest -o addopts='' tests/integrations

  benchmark:
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[pandas]

      - name: Run pandas benchmark (release check)
        run: python scripts/benchmark_pandas_validate.py --rows 1000000 --target-seconds 10.0
